name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || true

      - name: Build Xcode Project By Target
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          echo "Found project file: $PROJ"
          
          # Компилируем напрямую через цель (-target), минуя скрытые схемы
          xcodebuild -project "$PROJ" \
                     -target "Gyroflow Toolbox" \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Archive Built Application
        run: |
          mkdir -p dist
          # Находим скомпилированное приложение в DerivedData
          APP_PATH=$(find build_output -name "Gyroflow Toolbox.app" -type d -print -quit)
          
          if [ -n "$APP_PATH" ]; then
            echo "Moving bundle from $APP_PATH"
            cp -R "$APP_PATH" dist/
          else
            echo "Fallback: checking Products folder"
            cp -R build_output/Build/Products/Release/Gyroflow\ Toolbox.app dist/ 2>/dev/null || true
          fi
          
          cd dist && zip -r ../gyroflow-toolbox-plugin.zip "Gyroflow Toolbox.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
