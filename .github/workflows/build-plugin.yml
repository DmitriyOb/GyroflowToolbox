name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || true

      - name: Build Xcode Project
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          echo "Found project file: $PROJ"
          
          # Автоматически определяем первую доступную схему в проекте
          SCHEME=$(xcodebuild -project "$PROJ" -list | grep -A 10 "Schemes:" | tail -n +2 | tr -d ' ' | head -n 1)
          echo "Automatically detected scheme: $SCHEME"
          
          # Если схема не найдена, используем имя проекта по умолчанию
          if [ -z "$SCHEME" ]; then
            SCHEME="Gyroflow"
          fi
          
          xcodebuild -project "$PROJ" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Archive Built Application
        run: |
          mkdir -p dist
          # Ищем любое скомпилированное приложение или плагин в папке вывода
          APP_PATH=$(find build_output -name "*.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build_output -name "*.fsplugin" -type d -print -quit)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Moving bundle from $APP_PATH"
            cp -R "$APP_PATH" dist/
          else
            echo "No app bundle found, copying entire build folder"
            cp -R build_output/Build/Products/Release/ dist/ 2>/dev/null || cp -R build_output/ dist/
          fi
          
          cd dist && zip -r ../gyroflow-toolbox-plugin.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
