name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || true

      - name: Build Xcode Project By Target
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          echo "Found project file: $PROJ"
          
          # Убран флаг -derivedDataPath, компиляция идет в стандартную папку Xcode
          xcodebuild -project "$PROJ" \
                     -target "Gyroflow Toolbox" \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Archive Built Application
        run: |
          mkdir -p dist
          
          # Ищем скомпилированное приложение в стандартной системной папке Xcode DerivedData
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Gyroflow Toolbox.app" -type d -print -quit)
          
          # Если там не нашли, ищем в локальной папке проекта
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Gyroflow Toolbox.app" -type d -print -quit)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Moving bundle from $APP_PATH"
            cp -R "$APP_PATH" dist/
            cd dist && zip -r ../gyroflow-toolbox-plugin.zip "Gyroflow Toolbox.app"
          else
            echo "Error: Gyroflow Toolbox.app not found anywhere!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
