name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build Application
        run: |
          # Автоматически находим папку, где лежит xcodeproj, и переходим в неё
          PROJECT_PATH=$(find . -name "GyroflowToolbox.xcodeproj" -maxdepth 3 -print -quit)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          echo "Found project in directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          xcodebuild -project GyroflowToolbox.xcodeproj \
                     -scheme "Gyroflow Toolbox" \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Archive App
        run: |
          # Ищем скомпилированное приложение и архивируем его
          mkdir -p dist
          APP_PATH=$(find . -name "Gyroflow Toolbox.app" -type d -print -quit)
          echo "Found built app at: $APP_PATH"
          cp -R "$APP_PATH" dist/
          cd dist && zip -r ../gyroflow-toolbox.zip "Gyroflow Toolbox.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox.zip
