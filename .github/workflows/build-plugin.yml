name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || true

      - name: Build with Autogenerated Scheme
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          echo "Found project file: $PROJ"
          
          # Переходим в папку с проектом, чтобы xcodebuild отработал локально
          cd "$(dirname "$PROJ")"
          
          # Собираем проект, используя имя самого файла проекта как схему по умолчанию
          xcodebuild -project "Gyroflow.xcodeproj" \
                     -scheme "Gyroflow" \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Archive Built Application
        run: |
          mkdir -p dist
          
          # Ищем скомпилированное приложение в папке сборки
          APP_PATH=$(find . -name "Gyroflow Toolbox.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d -print -quit)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Moving bundle from $APP_PATH"
            cp -R "$APP_PATH" dist/
            cd dist && zip -r ../gyroflow-toolbox-plugin.zip *
          else
            echo "Error: Application bundle not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
