name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || true

      - name: Build with Autodetected Workspace Scheme
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          echo "Found project file: $PROJ"
          cd "$(dirname "$PROJ")"
          
          # Автоматически находим вообще любую рабочую схему, которая есть в проекте
          SCHEME=$(xcodebuild -list -json | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['project']['schemes'][0] if data['project']['schemes'] else '')")
          echo "Detected local scheme: $SCHEME"
          
          # Если схема не определилась, собираем весь воркспейс по умолчанию
          if [ -z "$SCHEME" ]; then
            xcodebuild -alltargets -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          else
            xcodebuild -project "Gyroflow.xcodeproj" \
                       -scheme "$SCHEME" \
                       -configuration Release \
                       -derivedDataPath build_output \
                       CODE_SIGNING_ALLOWED=NO \
                       CODE_SIGNING_REQUIRED=NO \
                       CODE_SIGN_IDENTITY="" \
                       COMPILER_INDEX_STORE_ENABLE=NO
          fi

      - name: Archive Built Application
        run: |
          mkdir -p dist
          
          # Ищем скомпилированное приложение .app во всех папках сборки
          APP_PATH=$(find . -name "Gyroflow Toolbox.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d -print -quit)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Moving bundle from $APP_PATH"
            cp -R "$APP_PATH" dist/
            cd dist && zip -r ../gyroflow-toolbox-plugin.zip *
          else
            echo "Fallback: archiving entire build directory"
            cp -R Source/build_output/Build/Products/Release/ dist/ 2>/dev/null || true
            cd dist && zip -r ../gyroflow-toolbox-plugin.zip .
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
