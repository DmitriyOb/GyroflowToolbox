name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build via Swift Package Manager
        run: |
          # Переходим в папку с исходным кодом, если она вложена
          SRC_DIR=$(find . -name "Package.swift" -maxdepth 3 -print -quit)
          if [ -n "$SRC_DIR" ]; then
            cd "$(dirname "$SRC_DIR")"
          fi
          
          # Запускаем сборку универсального бинарника расширения
          swift build -c release \
                      --triple arm64-apple-macosx \
                      -Xswiftc "-disable-sandbox"

      - name: Archive Built Extensions
        run: |
          mkdir -p dist
          
          # Собираем все скомпилированные артефакты плагина (.app, .fsplugin, .ext)
          find .build -name "*.app" -o -name "*.fsplugin" -o -name "*.bundle" -exec cp -R {} dist/ \; 2>/dev/null || true
          
          # Если структуры бандла еще нет, упаковываем исполняемые файлы напрямую
          if [ -z "$(ls -A dist)" ]; then
            cp -R .build/release/ dist/ 2>/dev/null || cp -R .build/ dist/
          fi
          
          cd dist && zip -r ../gyroflow-toolbox-plugin.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
