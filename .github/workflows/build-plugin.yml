name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || true

      - name: Force Build All Targets Independently
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 3 -print -quit)
          echo "Found project file: $PROJ"
          cd "$(dirname "$PROJ")"
          
          # Собираем абсолютно все цели, полностью отключая подпись и требования сертификатов
          xcodebuild -alltargets \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO || true

      - name: Archive Anything That Succeeded
        run: |
          mkdir -p dist
          
          # Ищем любые бандлы расширений, плагинов или приложений, которые успели собраться
          find . -name "*.app" -type d -exec cp -R {} dist/ \; 2>/dev/null || true
          find . -name "*.fsplugin" -type d -exec cp -R {} dist/ \; 2>/dev/null || true
          find . -name "*.pluginkit" -type d -exec cp -R {} dist/ \; 2>/dev/null || true
          
          # Если папка всё ещё пустая, забираем всю папку готовых продуктов
          if [ -z "$(ls -A dist)" ]; then
            cp -R Source/build_output/Build/Products/Release/ dist/ 2>/dev/null || true
          fi
          
          cd dist && zip -r ../gyroflow-toolbox-plugin.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
