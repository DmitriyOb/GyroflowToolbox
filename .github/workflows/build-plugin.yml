name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build Swift Package
        run: |
          swift build -c release --arch arm64 --arch x86_64

      - name: Archive Built Plugin
        run: |
          mkdir -p dist
          # Ищем скомпилированные бинарные файлы или бандл плагина
          find .build/apple/Products/Release -name "*.app" -o -name "*.fsplugin" -o -name "*.bundle" -exec cp -R {} dist/ \; 2>/dev/null || true
          
          # Если плагин собирается как исполняемый файл, копируем всю папку сборки
          if [ -z "$(ls -A dist)" ]; then
            cp -R .build/release dist/
          fi
          
          cd dist && zip -r ../gyroflow-toolbox-plugin.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
