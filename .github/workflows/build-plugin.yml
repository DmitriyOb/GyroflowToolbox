name: Build Gyroflow Toolbox Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Open and Resolve Package Dependencies
        run: |
          # Принудительно заставляем Xcode подтянуть все внутренние зависимости
          xcodebuild -resolvePackageDependencies -project "Gyroflow Toolbox.xcodeproj" || xcodebuild -resolvePackageDependencies -project "GyroflowToolbox.xcodeproj" || true

      - name: Build Xcode Project
        run: |
          # Ищем точное имя файла проекта (с пробелом или без)
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 2 -print -quit)
          echo "Found project file: $PROJ"
          
          # Запуск компиляции без требований платного сертификата Apple
          xcodebuild -project "$PROJ" \
                     -scheme "Gyroflow Toolbox" \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Archive Built Application
        run: |
          mkdir -p dist
          # Ищем скомпилированное приложение .app во вложенных папках вывода
          APP_PATH=$(find build_output -name "Gyroflow Toolbox.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build_output -name "*.app" -type d -print -quit)
          fi
          
          echo "Moving App from $APP_PATH"
          cp -R "$APP_PATH" dist/
          cd dist && zip -r ../gyroflow-toolbox-plugin.zip "Gyroflow Toolbox.app" || zip -r ../gyroflow-toolbox-plugin.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Plugin
          path: gyroflow-toolbox-plugin.zip
